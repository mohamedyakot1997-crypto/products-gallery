<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - جاليري المنتجات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
            text-align: right;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #667eea;
            font-size: 26px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
        }

        /* Form Styles */
        .form-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-start;
            flex-wrap: wrap;
        }

        #cancelBtn {
            display: none;
        }

        /* Image Preview */
        #imagePreview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .image-preview-item {
            position: relative;
            border-radius: 5px;
            overflow: hidden;
        }

        .image-preview-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
        }

        .image-preview-item button {
            position: absolute;
            bottom: 5px;
            right: 5px;
            padding: 5px 10px;
            font-size: 12px;
        }

        /* Table Styles */
        .table-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        .table-section h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: right;
            font-weight: bold;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        .action-buttons .btn {
            padding: 6px 12px;
            font-size: 12px;
            margin: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }

            header h1 {
                font-size: 20px;
            }

            .header-buttons {
                width: 100%;
                justify-content: center;
            }

            .form-section {
                padding: 20px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>⚙️ لوحة التحكم</h1>
            <div class="header-buttons">
                <a href="index.html" class="btn btn-secondary">العودة للمتجر</a>
            </div>
        </header>

        <!-- Add/Edit Product Form -->
        <div class="form-section">
            <h2>إضافة/تعديل منتج</h2>
            <form id="productForm" onsubmit="addProduct(event)">
                <div class="form-group">
                    <label for="productName">اسم المنتج *</label>
                    <input 
                        type="text" 
                        id="productName" 
                        placeholder="أدخل اسم المنتج" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="productDescription">وصف المنتج *</label>
                    <textarea 
                        id="productDescription" 
                        placeholder="أدخل وصف تفصيلي للمنتج"
                        required
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="productPrice">السعر *</label>
                    <input 
                        type="number" 
                        id="productPrice" 
                        placeholder="أدخل السعر" 
                        step="0.01"
                        min="0"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="imageUrls">روابط الصور (واحد لكل سطر) *</label>
                    <textarea 
                        id="imageUrls" 
                        placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.jpg"
                        required
                    ></textarea>
                    <small style="color: #666; display: block; margin-top: 5px;">
                        أدخل رابط كامل لكل صورة في سطر منفصل
                    </small>
                </div>

                <div>
                    <label>معاينة الصور:</label>
                    <div id="imagePreview"></div>
                </div>

                <div class="form-buttons">
                    <button type="submit" id="submitBtn" class="btn btn-success">إضافة منتج</button>
                    <button type="button" id="cancelBtn" class="btn btn-secondary">إلغاء التعديل</button>
                    <button type="button" class="btn btn-secondary" onclick="resetToDefault()">إعادة تعيين البيانات</button>
                </div>
            </form>
        </div>

        <!-- Products Table -->
        <div class="table-section">
            <h2>المنتجات الموجودة</h2>
            <table>
                <thead>
                    <tr>
                        <th>الرقم</th>
                        <th>الاسم</th>
                        <th>السعر</th>
                        <th>عدد الصور</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr>
                        <td colspan="5" style="text-align: center;">جاري التحميل...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
